    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
        margin: 0;
        padding: 0;
      }

      header {
        background-color: #2f4f7f;
        color: white;
        padding: 15px;
        text-align: left;
      }

      header i {
        font-size: 24px;
        color: white;
        position: absolute;
        left: 15px;
        top: 15px;
        cursor: pointer;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        padding: 0;
        margin-left: 40px;
      }

      .container {
        margin: 20px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        font-weight: bold;
        margin-bottom: 5px;
      }

      .form-group input,
      .form-group select {
        width: 93%;
        padding: 10px;
        border-radius: 5px;
        border: 1px solid #ddd;
        font-size: 16px;
      }

      .form-group input:disabled {
        background-color: #f5f5f5;
      }

      #proceedButton {
        background-color: #2f4f7f;
        color: white;
        padding: 12px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        width: 90%;
        margin: 0 auto;
        display: block;
      }

      #proceedButton:hover {
        background-color: #2f4f7f;
      }

      .bottom-sheet {
        position: fixed;
        bottom: -100%;
        left: 0;
        right: 0;
        background-color: white;
        padding: 20px;
        text-align: center;
        transition: bottom 0.3s ease;
      }

      .sheet-content img {
        width: 50px;
        height: 50px;
      }

      .sheet-content p {
        font-size: 16px;
        margin: 20px 0;
      }

      #closeSheet {
        background-color: #fff;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      #closeSheet:hover {
        background-color: #2f4f7f;
      }
    </style>
  </head>

          alt="Failed Icon"
        />

          Your transfer to <span id="accountNameSpan"></span> failed due to
          insufficient balance. Please fund/deposit and try again.
        </p>
        <button id="closeSheet">❌</button>
      </div>
    </div>

    <script>
      document
        .getElementById("proceedButton")
        .addEventListener("click", async () => {
          const accountNumber = document.getElementById("accountNumber").value;
          const bankCode = document.getElementById("bank").value;

          if (!accountNumber || !bankCode) {
            alert("Please fill out all fields.");
            return;
          }

          const resultDiv = document.getElementById("accountName");

          // Monnify credentials
          const apiKey = "MK_TEST_N5X910LS9V";
          const secretKey = "LTF6KNFHFLQQL7XFB1L4HRUEAK4G0SGH";
          const baseUrl = "https://sandbox.monnify.com";

          // Encode API keys to Base64
          const credentials = btoa(`${apiKey}:${secretKey}`);

          try {
            // Get authentication token
            const authResponse = await fetch(`${baseUrl}/api/v1/auth/login`, {
              method: "POST",
              headers: {
                Authorization: `Basic ${credentials}`,
                "Content-Type": "application/json",
              },
            });

            const authData = await authResponse.json();
            const accessToken = authData.responseBody.accessToken;

            // Fetch account name
            const response = await fetch(
              `${baseUrl}/api/v1/disbursements/account/validate?accountNumber=${accountNumber}&bankCode=${bankCode}`,
              {
                method: "GET",
                headers: {
                  Authorization: `Bearer ${accessToken}`,
                  "Content-Type": "application/json",
                },
              }
            );

            const data = await response.json();

            if (data.responseBody && data.responseBody.accountName) {
              resultDiv.value = data.responseBody.accountName;

              // Display the bottom sheet with confirmation message
              document.getElementById("confirmationMessage").innerHTML = `
              Your transfer to ${data.responseBody.accountName} failed due to insufficient balance. Please fund/deposit and try again.`;
              document.getElementById("bottomSheet").style.bottom = "0";
            } else {
              alert("Account verification failed.");
            }
          } catch (error) {
            console.error("Error:", error);
            alert("An error occurred while verifying the account.");
          }
        });

      // Close the bottom sheet
      document.getElementById("closeSheet").addEventListener("click", () => {
        document.getElementById("bottomSheet").style.bottom = "-100%";
      });
    </script>
