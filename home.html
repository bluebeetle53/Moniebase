      <a href="airtime.html">

    <script>
      // Firebase Configuration
      const firebaseConfig = {
        apiKey: "AIzaSyDJP2XIR51qGTLINiKvEoscYTMt11CaZ5s",
        authDomain: "paytrust-71e30.firebaseapp.com",
        databaseURL: "https://paytrust-71e30-default-rtdb.firebaseio.com/",
        projectId: "paytrust-71e30",
        storageBucket: "paytrust-71e30.appspot.com",
        messagingSenderId: "492609516838",
        appId: "1:492609516838:android:5a924ad3b7e8e508fa3de7",
      };

      // Initialize Firebase
      firebase.initializeApp(firebaseConfig);
      const database = firebase.database();
      const auth = firebase.auth(); // Initialize Firebase Authentication

      // Function to display toast message
      function showToast(message) {
        const toast = document.createElement("div");
        toast.className = "toast";
        toast.textContent = message;
        document.body.appendChild(toast);

        // Remove toast after 3 seconds
        setTimeout(() => {
          toast.remove();
        }, 3000);
      }

      // Format currency
      function formatCurrency(amount) {
        return new Intl.NumberFormat("en-NG", {
          style: "currency",
          currency: "NGN",
          minimumFractionDigits: 2,
        }).format(amount);
      }

      // Get transaction icon based on type
      function getTransactionIcon(type) {
        switch (type) {
          case "transfer":
            return '<i class="fas fa-paper-plane"></i>';
          case "deposit":
            return '<i class="fas fa-download"></i>';
          case "withdrawal":
            return '<i class="fas fa-upload"></i>';
          default:
            return '<i class="fas fa-exchange-alt"></i>';
        }
      }

      // Get transaction status class
      function getStatusClass(status) {
        switch (status) {
          case "success":
            return "status-success";
          case "pending":
            return "status-pending";
          case "failed":
            return "status-failed";
          default:
            return "status-success";
        }
      }

      // Get transaction title
      function getTransactionTitle(transaction) {
        if (transaction.type === "transfer") {
          return `Transfer to ${
            transaction.recipient?.accountName || "Unknown"
          }`;
        } else if (transaction.type === "deposit") {
          return `Deposit from ${transaction.sender?.name || "Unknown"}`;
        } else if (transaction.type === "withdrawal") {
          return `Withdrawal`;
        }
        return "Transaction";
      }

      // Function to retrieve user data from Firebase and display it
      function displayUserData(user) {
        const userRef = database.ref("users/" + user.uid);

        userRef.once("value", (snapshot) => {
          const userData = snapshot.val();
          
          if (userData) {
            // Display the balance and phone number
            document.getElementById("amount").textContent = "" + userData.balance.toFixed(2); // Show balance
            document.getElementById("user-phone").textContent = userData.phone || "No phone number"; // Show phone number
          } else {
            showToast("User data not found in Moniebase.");
          }
        }).catch((error) => {
          console.error("Error fetching user data:", error);
          showToast("Error fetching user data.");
        });
        
        // Fetch and display recent transactions
        const userTransactionsRef = database.ref(`users/${user.uid}/transactions`);
        userTransactionsRef.limitToLast(3).on("value", (snapshot) => {
          const transactionList = document.getElementById("transaction-list");
          const noTransactions = document.getElementById("no-transactions");
          
          transactionList.innerHTML = "";
          
          const transactions = snapshot.val();
          if (transactions) {
            // Convert to array and sort by timestamp (newest first)
            const transactionsArray = Object.values(transactions).sort((a, b) => {
              return (b.timestamp || 0) - (a.timestamp || 0);
            });
            
            noTransactions.style.display = "none";
            transactionList.style.display = "block";
            
            // Display only the last 3 transactions
            transactionsArray.slice(0, 3).forEach(transaction => {
              const transactionDiv = document.createElement("div");
              transactionDiv.className = "transaction";
              transactionDiv.setAttribute("data-id", transaction.transactionId);
              
              const amountClass = transaction.type === "deposit" ? "credit" : "debit";
              const amountPrefix = transaction.type === "deposit" ? "+" : "-";
              
              transactionDiv.innerHTML = `
                <div class="transaction-header">
                  <div class="transaction-details">
                    <div class="transaction-icon">
                      ${getTransactionIcon(transaction.type)}
                    </div>
                    <div class="transaction-info">
                      <p><strong>${getTransactionTitle(transaction)}</strong></p>
                      <p class="date">${new Date(transaction.timestamp).toLocaleDateString()}</p>
                    </div>
                  </div>
                  <div>
                    <p class="transaction-amount ${amountClass}">${amountPrefix}${formatCurrency(transaction.amount)}</p>
                    <span class="status ${getStatusClass(transaction.status)}">${transaction.status}</span>
                  </div>
                </div>
              `;
              
              transactionList.appendChild(transactionDiv);
              
              // Add click event to show transaction details
              transactionDiv.addEventListener("click", () => {
                // Redirect to transaction details
                window.location.href = `history.html`;
              });
            });
          } else {
            transactionList.style.display = "none";
            noTransactions.style.display = "flex";
          }
        }, (error) => {
          console.error("Error fetching transactions:", error);
          showToast("Error loading transactions.");
        });
      }

      // Check if user is logged in
      auth.onAuthStateChanged((user) => {
        if (user) {
          // If user is logged in, fetch their data from Firebase
          displayUserData(user);
        } else {
          // Redirect to login page if user is not logged in
          window.location.href = "login.html";
        }
      });
    </script>

    <script>
        function redirectToLogin() {
            window.location.href = "login.html";
        }

        let inactivityTimeout;
        
        function resetInactivityTimer() {
            clearTimeout(inactivityTimeout);
            inactivityTimeout = setTimeout(redirectToLogin, 20000);
        }

        document.addEventListener("mousemove", resetInactivityTimer);
        document.addEventListener("keydown", resetInactivityTimer);

        resetInactivityTimer();

        window.addEventListener("beforeunload", function (event) {
            const message = "Moniebase is the best";
            event.returnValue = message;
            return message; 
        });
    </script>

  </body>
